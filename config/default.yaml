app:
  name: Dumbo
  profile: recommended
  trusted_mode: true
  max_tool_calls_per_request: 8
  tool_timeout_seconds: 30
  enable_privileged_tools: true
  app_aliases:
    chrome: C:/Program Files/Google/Chrome/Application/chrome.exe
    google chrome: C:/Program Files/Google/Chrome/Application/chrome.exe
    edge: msedge
    microsoft edge: msedge
    firefox: firefox
    word: winword.exe
    microsoft word: winword.exe
    ms word: winword.exe
    excel: excel.exe
    microsoft excel: excel.exe
    powerpoint: powerpnt.exe
    power point: powerpnt.exe
    microsoft powerpoint: powerpnt.exe
    outlook: outlook.exe
    microsoft outlook: outlook.exe
    onenote: onenote.exe
    one note: onenote.exe
    microsoft onenote: onenote.exe
    vscode: code
    vs code: code
    visual studio code: code
  allowed_executable_paths:
    - C:/

model:
  context_tokens: 64000
  temperature: 0.2
  top_p: 0.9
  top_k: 40
  repeat_penalty: 1.08
  num_predict: 4096
  reasoning_effort: high

ollama:
  base_url: http://localhost:11434
  request_timeout_seconds: 120
  pull_timeout_seconds: 3600

filesystem:
  include_available_drives: true
  project_roots: []
  allow_sensitive_reads: true

voice:
  enabled: false
  push_to_talk_key: ctrl+space
  stt_model: small.en
  tts_voice: ""
  save_audio: false

browser:
  headless: false
  trusted_local_urls: []

audit:
  tail_limit: 20
